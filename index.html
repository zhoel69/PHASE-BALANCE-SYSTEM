<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>PHASE BALANCE SYSTEM</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;

  -webkit-user-select:none;
  -ms-user-select:none;
  user-select:none;

  -webkit-touch-callout:none;
}

body{
  background:#0F1115;
  padding:14px;
  color:#D8FFD8;
  touch-action:manipulation;
}

.container{
  max-width:540px;
  margin:auto;
}

.card{
  background:#171A21;
  border-radius:24px;
  padding:18px;
  border:1px solid #222831;

  box-shadow:
  0 0 20px rgba(0,255,120,0.08),
  0 0 40px rgba(255,0,80,0.05);
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:900;
  color:#00FF88;
  letter-spacing:1px;
}

.sub{
  text-align:center;
  margin-top:6px;
  margin-bottom:22px;
  color:#8B949E;
  font-size:11px;
  letter-spacing:2px;
}

.form-title{
  margin-bottom:14px;
  font-size:13px;
  font-weight:bold;
  color:#00FF88;
  letter-spacing:1px;
}

.form-group{
  margin-bottom:14px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:11px;
  font-weight:bold;
  color:#9CFFA7;
  letter-spacing:1px;
}

.input{
  width:100%;
  height:50px;
  border:none;
  border-radius:15px;
  background:#11151C;
  padding:0 14px;
  font-size:13px;
  color:#E8FFE8;
  border:1px solid #2A313C;
  text-transform:uppercase;
}

.input:focus{
  outline:none;
  border:2px solid #00FF88;
  background:#0F1319;
}

select.input{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

.btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;

  background:linear-gradient(
  135deg,
  #00FF88,
  #00CC6A
  );

  color:#000;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:1px;
  margin-top:10px;
}

.reset-btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;

  background:linear-gradient(
  135deg,
  #FF5C5C,
  #D93636
  );

  color:#FFF;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:1px;
  margin-top:10px;
}

.list-box{
  margin-top:18px;
  background:#11151C;
  border-radius:16px;
  padding:16px;
  border:1px solid #2A313C;
}

.list-title{
  color:#00FF88;
  font-size:14px;
  font-weight:900;
  margin-bottom:12px;
  letter-spacing:1px;
}

.item{
  padding:14px;
  border-radius:14px;
  background:#171A21;
  margin-bottom:12px;
  border:1px solid #2A313C;
  white-space:pre-line;
  line-height:1.6;
  font-size:13px;
}

.balance{
  color:#00FF88;
  font-weight:bold;
}

.minus{
  color:#FF5C5C;
  font-weight:bold;
}

.plus{
  color:#FFD65C;
  font-weight:bold;
}

.total-number{
  color:#00FF88;
  font-weight:bold;
}

.footer{
  text-align:center;
  margin-top:20px;
  color:#7E8793;
  font-size:11px;
  letter-spacing:1px;
}

</style>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">
      PHASE BALANCE SYSTEM
    </div>

    <div class="sub">
      SMART COUNT & CHECK
    </div>

    <!-- SURAT JALAN -->
    <div class="form-title">
      DATA SURAT JALAN
    </div>

    <!-- DRIVER -->
    <div class="form-group">

      <label>NAMA DRIVER</label>

      <input type="text"
             class="input"
             id="driver"
             placeholder="INPUT DRIVER">

    </div>

    <!-- NOPOL -->
    <div class="form-group">

      <label>NOMOR POLISI</label>

      <input type="text"
             class="input"
             id="nopol"
             placeholder="INPUT NOMOR POLISI">

    </div>

    <!-- PHASE + JENIS -->
    <div class="grid2">

      <div class="form-group">

        <label>NO. PHASE</label>

        <input type="text"
               class="input"
               id="phase"
               placeholder="INPUT NO. PHASE">

      </div>

      <div class="form-group">

        <label>JENIS PHASE</label>

        <select class="input"
                id="jenis">

          <option>AWB</option>
          <option>NON AWB</option>
          <option>LIQUID</option>

        </select>

      </div>

    </div>

    <!-- TOTAL SURAT -->
    <div class="form-group">

      <label>JUMLAH BAG SURAT JALAN</label>

      <input type="number"
             class="input"
             id="suratjalan"
             placeholder="INPUT JUMLAH BAG">

    </div>

    <!-- MANUAL -->
    <div class="form-title"
         style="margin-top:22px;">

      DATA PENGERJAAN MANUAL

    </div>

    <!-- TOTAL KERJA -->
    <div class="form-group">

      <label>JUMLAH BAG HASIL KERJA</label>

      <input type="number"
             class="input"
             id="kerja"
             placeholder="INPUT JUMLAH BAG">

    </div>

    <!-- NO LABEL -->
    <div class="form-group">

      <label>JUMLAH NO LABEL</label>

      <input type="number"
             class="input"
             id="nolabel"
             placeholder="INPUT NO LABEL">

    </div>

    <!-- BUTTON -->
    <button class="btn"
            onclick="tambahData()">

      TAMBAH DATA

    </button>

    <!-- RESET -->
    <button class="reset-btn"
            onclick="resetData()">

      RESET SEMUA DATA

    </button>

    <!-- LIST -->
    <div class="list-box">

      <div class="list-title">
        LIST HASIL PHASE
      </div>

      <div id="listData"></div>

    </div>

    <!-- GRAND -->
    <div class="list-box">

      <div class="list-title">
        GRAND TOTAL
      </div>

      <div id="grandTotal"></div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      ©2026 ZULFAHMI AFNULA. ALL RIGHTS RESERVED.
    </div>

  </div>

</div>

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL =
'https://wepqievfgfqsoilynrhc.supabase.co';

const SUPABASE_KEY =
'sb_publishable_AUDqRGYqJi1pA7Y_QOIa-A_bIz-_zI1';

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* ================= BLOK COPY PASTE ================= */

document.addEventListener(
'copy',
e => e.preventDefault()
);

document.addEventListener(
'cut',
e => e.preventDefault()
);

document.addEventListener(
'paste',
e => e.preventDefault()
);

document.addEventListener(
'contextmenu',
e => e.preventDefault()
);

/* ================= DATA ================= */

let semuaData = [];

/* ================= REALTIME ================= */

const semuaInput =
document.querySelectorAll(
'input,select'
);

semuaInput.forEach(el => {

  el.addEventListener('input',()=>{

    if(el.type !== 'number'){

      el.value =
      el.value.toUpperCase();

    }

  });

});

/* ================= FORMAT NOPOL ================= */

const nopolInput =
document.getElementById('nopol');

nopolInput.addEventListener('input',()=>{

  let value =
  nopolInput.value
  .replace(/\s+/g,'')
  .toUpperCase();

  let hasil = '';

  const match =
  value.match(/^([A-Z]+)(\d+)?([A-Z]+)?$/);

  if(match){

    if(match[1]){

      hasil += match[1];

    }

    if(match[2]){

      hasil += ' ' + match[2];

    }

    if(match[3]){

      hasil += ' ' + match[3];

    }

  }else{

    hasil = value;

  }

  nopolInput.value = hasil.trim();

});

/* ================= LOAD DATA ================= */

loadData();

async function loadData(){

  const {
    data,
    error
  } = await supabaseClient
  .from('phase_balance')
  .select('*')
  .order('id',{ascending:true});

  if(error){

    console.log(error);
    return;

  }

  semuaData = data || [];

  renderData();

}

/* ================= TAMBAH DATA ================= */

async function tambahData(){

  const driver =
  document.getElementById('driver')
  .value.trim();

  const nopol =
  document.getElementById('nopol')
  .value.trim();

  const phase =
  document.getElementById('phase')
  .value.trim();

  const jenis =
  document.getElementById('jenis')
  .value;

  const suratjalan =
  parseInt(
  document.getElementById('suratjalan')
  .value
  ) || 0;

  const kerja =
  parseInt(
  document.getElementById('kerja')
  .value
  ) || 0;

  const nolabel =
  parseInt(
  document.getElementById('nolabel')
  .value
  ) || 0;

  if(!phase){

    alert('INPUT PHASE');
    return;

  }

  const totalReal =
  kerja + nolabel;

  let status = '';
  let classStatus = '';

  if(totalReal === suratjalan){

    status = 'BALANCE';
    classStatus = 'balance';

  }else if(totalReal < suratjalan){

    status =
    `MINUS ${suratjalan - totalReal}`;

    classStatus = 'minus';

  }else{

    status =
    `PLUS ${totalReal - suratjalan}`;

    classStatus = 'plus';

  }

  const simpanData = {

    driver,
    nopol,
    phase,
    jenis,
    suratjalan,
    kerja,
    nolabel,
    totalreal: totalReal,
    status,
    classstatus: classStatus

  };

  const {
    error
  } = await supabaseClient
  .from('phase_balance')
  .insert([simpanData]);

  if(error){

    console.log(error);
    alert('GAGAL SIMPAN DATA');
    return;

  }

  semuaData.push({

    ...simpanData,
    totalReal,
    classStatus

  });

  renderData();

  document.getElementById('driver')
  .value='';

  document.getElementById('nopol')
  .value='';

  document.getElementById('phase')
  .value='';

  document.getElementById('jenis')
  .selectedIndex=0;

  document.getElementById('suratjalan')
  .value='';

  document.getElementById('kerja')
  .value='';

  document.getElementById('nolabel')
  .value='';

}

/* ================= RESET ================= */

async function resetData(){

  const yakin =
  confirm(
  'YAKIN MAU HAPUS SEMUA DATA?'
  );

  if(!yakin) return;

  const {
    error
  } = await supabaseClient
  .from('phase_balance')
  .delete()
  .neq('id',0);

  if(error){

    console.log(error);
    alert('GAGAL RESET DATA');
    return;

  }

  semuaData = [];

  renderData();

}

/* ================= RENDER ================= */

function renderData(){

  let html='';

  let grandLabel = 0;
  let grandNoLabel = 0;

  semuaData.forEach(item => {

    grandLabel += Number(item.kerja);
    grandNoLabel += Number(item.nolabel);

    html += `

<div class="item">

DRIVER : ${item.driver}
NOPOL : ${item.nopol}

PHASE : ${item.phase}
JENIS : ${item.jenis}

SURAT JALAN : ${item.suratjalan} BAG
HASIL KERJA : ${item.kerja} BAG
NO LABEL : ${item.nolabel} BAG

TOTAL REAL : ${item.totalreal || item.totalReal} BAG

<span class="${item.classstatus || item.classStatus}">
STATUS : ${item.status}
</span>

</div>

`;

  });

  document.getElementById('listData')
  .innerHTML = html;

  document.getElementById('grandTotal')
  .innerHTML =

`TOTAL BAG LABEL : <span class="total-number">${grandLabel}</span> BAG

TOTAL NO LABEL : <span class="total-number">${grandNoLabel}</span> BAG`;

}

</script>

</body>
</html>
